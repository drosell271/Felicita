<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acceso · {{ app_name }}</title><link rel="icon" href="/static/favicon.svg" type="image/svg+xml"><meta name="theme-color" content="#111817"><link rel="stylesheet" href="/static/app.css?v=5"><link rel="stylesheet" href="/static/corporate.css?v=5"></head>
<body class="login-page"><div class="grain"></div><section class="login-art"><div class="sun"></div><p>Felicita · Plataforma interna</p><h1>Comunicaciones<br>corporativas<br><em>automatizadas.</em></h1><span>Programación · Personalización · Registro</span></section>
